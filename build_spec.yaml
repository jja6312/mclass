version: 0.1
component: build                    
timeoutInSeconds: 10000             
runAs: root                         
shell: bash                                  
   
steps:
  - type: Command
    name: "Maven Build"
    command: |
      mvn package
    onFailure:
      - type: Command
        command: |
          echo "Failured Maven Build"
        timeoutInSeconds: 10000
        runAs: root

outputArtifacts:
  - name: deployment_spec
    type: BINARY
    location: ${OCI_PRIMARY_SOURCE_DIR}/deploy_spec.yaml
  - name: jar
    type: BINARY
    location: ${OCI_PRIMARY_SOURCE_DIR}/target/demo-0.0.1-SNAPSHOT.jar